spring:
  application:
    name: dashboard-api
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    sql:
      init:
        mode: always
    h2:
      console:
        enabled: true

server:
  port: 9090